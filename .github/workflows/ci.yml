name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore backend/Adaminator.sln
      - name: Build
        run: dotnet build backend/Adaminator.sln --no-restore -c Release
      - name: Test
        # Integration tests use Testcontainers; Docker is available on the runner.
        run: dotnet test backend/Adaminator.sln --no-build -c Release --verbosity normal

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend

  docker:
    runs-on: ubuntu-latest
    needs: [ backend, frontend ]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t adaminator-api ./backend
      - name: Build frontend image
        run: docker build -t adaminator-frontend ./frontend
