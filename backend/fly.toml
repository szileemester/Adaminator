app = "adaminator-api"
primary_region = "fra"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  path = "/health"
  interval = "15s"
  timeout = "5s"

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  ASPNETCORE_HTTP_PORTS = "8080"
  Cors__AllowedOrigins__0 = "https://adaminator.fly.dev"
